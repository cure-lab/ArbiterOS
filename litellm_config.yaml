model_list:
  - model_name: gpt-5.2
    litellm_params:
      model: openai/gpt-5.2
      api_key: "your_api_key"
      api_base: "your_api_url"
      response_format:
        type: json_schema
        json_schema:
          name: instruction_output
          schema:
            type: object
            properties:
              topic:
                type: string
                description: "A concise topic/title for this turn (keep it short, e.g. 8-20 Chinese chars or <= 40 chars)."
                maxLength: 60
              category:
                type: string
                enum:
                  - COGNITIVE_CORE__REASON
                  - COGNITIVE_CORE__PLAN
                  - COGNITIVE_CORE__CRITIQUE
                  - COGNITIVE_CORE__ASK
                  - COGNITIVE_CORE__RESPOND
                description: "The instruction category type. Use the most Accurate category possible, rather than only choose 'COGNITIVE_CORE__RESPOND'. "
              content:
                type: string
                description: "The actual content of the instruction. It can be anything and in any format you need to generate."
            required:
              - topic
              - category
              - content
            additionalProperties: false
          strict: true

litellm_settings:
  # Following settings for anthropics models
  # modify_params: true
  drop_params: true
  callbacks: arbiteros_kernel.litellm_callback.proxy_handler_instance
  # Langfuse tracing is emitted by arbiteros_kernel.litellm_callback
  # so all OpenClaw steps can be grouped into one session trace.
  success_callback: ["mlflow"]
  failure_callback: ["mlflow"]
