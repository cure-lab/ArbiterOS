# File-path trustworthiness classification.
#
# Keys   : HIGH | MID | LOW
# Values : glob patterns matched against individual path-like tokens extracted
#          from shell commands (using fnmatch / PurePosixPath.match).
#
# Matching priority (worst-case / most conservative wins):
#   LOW is checked first — if ANY path matches a LOW pattern the result is LOW.
#   Then MID, then HIGH.  If nothing matches, the default is MID.
#
# Rationale
#   LOW  — content received from external / untrusted sources; potential for
#           prompt injection or malicious payloads.
#   MID  — user-controlled or shared areas; trusted only within user context.
#   HIGH — system-managed or package-manager-installed paths; content is
#           generally verified by the OS or a trusted build pipeline.

LOW:
  # ── External URLs (untrusted by definition) ──────────────────────────────────
  - "http://*"
  - "https://*"
  - "ftp://*"
  - "ftps://*"

  # ── Downloads / received content ────────────────────────────────────────────
  - /home/*/Downloads/*
  - /home/*/Downloads/**
  - /home/*/Download/*
  - /home/*/Desktop/downloads/*
  - /home/*/Desktop/Downloads/*
  - ~/Downloads/*
  - ~/Downloads/**
  - ~/Download/*

  # ── Web-served / uploaded content ───────────────────────────────────────────
  - /var/www/html/*
  - /var/www/uploads/*
  - /var/www/upload/*
  - /srv/http/*
  - /srv/www/*

  # ── Upload / import staging directories ─────────────────────────────────────
  - /tmp/upload/*
  - /tmp/uploads/*
  - /var/tmp/upload/*
  - /var/tmp/uploads/*

  # ── Removable / external storage ─────────────────────────────────────────────
  - /media/**
  - /mnt/usb/**
  - /mnt/cdrom/**
  - /run/media/**

  # ── Container / socket boundaries (cross-isolation) ─────────────────────────
  - /var/run/docker.sock
  - /run/docker.sock

MID:
  # ── Shared temporary directories ─────────────────────────────────────────────
  - /tmp/*
  - /tmp/**
  - /var/tmp/*
  - /var/tmp/**
  - /run/*
  - /run/user/*

  # ── Package / build caches ───────────────────────────────────────────────────
  - /var/cache/*
  - /var/cache/**
  - ~/.cache/*
  - ~/.cache/**

  # ── General user home (user-controlled but not externally sourced) ───────────
  - /home/*
  - /home/**
  - ~/.*
  - ~/.*/**
  - ~/*

  # ── External storage (non-removable) ─────────────────────────────────────────
  - /media/*
  - /mnt/*

HIGH:
  # ── Package-manager-installed system binaries ─────────────────────────────────
  - /usr/bin/*
  - /usr/sbin/*
  - /usr/lib/*
  - /usr/lib/**
  - /usr/share/*
  - /usr/share/**
  - /usr/local/bin/*
  - /usr/local/lib/*
  - /bin/*
  - /sbin/*
  - /lib/*
  - /lib/**
  - /lib64/*

  # ── System configuration (admin-controlled) ───────────────────────────────────
  - /etc/*
  - /etc/**

  # ── Verified project workspace directories ────────────────────────────────────
  - /home/*/projects/*
  - /home/*/projects/**
  - /home/*/workspace/*
  - /home/*/workspace/**
  - /home/*/src/*
  - /home/*/src/**
  - /home/*/dev/*
  - /home/*/dev/**
  - /root/projects/*

  # ── Installed application data ────────────────────────────────────────────────
  - /opt/*
  - /opt/**
  - /snap/*
  - /snap/**

  # ── OpenClaw managed resources ───────────────────────────────────────────────
  # ~/.openclaw/skills/  — installed by the openclaw CLI update pipeline;
  #   treated as package-manager-equivalent (verified before installation).
  # ~/.openclaw/workspace/ (and workspace-*/) — the agent's own self-authored
  #   memory; not externally sourced.
  #   NOTE: trustworthiness uses worst-case resolution (LOW wins over MID over HIGH),
  #   so these entries only take effect when no LOW/MID pattern matches first.
  #   The general ~/.*/** MID catch-all means workspace paths resolve to MID
  #   in practice, which correctly reflects that workspace is user-editable content.
  - ~/.openclaw/skills/**
  - ~/.openclaw/workspace/**
  - ~/.openclaw/workspace-*/**
