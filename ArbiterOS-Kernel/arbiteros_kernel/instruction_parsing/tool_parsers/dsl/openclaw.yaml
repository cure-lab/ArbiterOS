      instruction_type: EXEC
      metadata:
        confidentiality: LOW
        trustworthiness: LOW
        reversible: false
  - match_type: regex
    cases:
    - arg: action
      pattern: "^(status|profiles|tabs|snapshot|screenshot|console|pdf)$"
      result:
        instruction_type: READ
        metadata:
          confidentiality: UNKNOWN
          trustworthiness: LOW
          reversible: true
    - arg: action
      pattern: "^dialog$"
      result:
        instruction_type: ASK
        metadata:
          confidentiality: LOW
          trustworthiness: LOW
          reversible: true

