  - match_type: path
    arg: file_path
  - match_type: regex
    cases:
    - arg: path
      pattern: "(^|/)(SOUL|MEMORY|AGENTS|USER|IDENTITY)\\.md$|/memory/[^/]+\\.md$"
      result:
