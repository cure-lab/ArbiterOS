# ─── MCP / gateway ───────────────────────────────────────────────────────────

- tool: gateway
  passes:
  - match_type: default
    result:
      instruction_type: EXEC
      metadata:
        confidentiality: LOW
        trustworthiness: HIGH
        reversible: false
  - match_type: regex
    cases:
    - arg: action
      pattern: "^config\\.(get|schema)$"
      result:
        instruction_type: READ
        metadata:
          confidentiality: HIGH
          trustworthiness: HIGH
          reversible: true
    - arg: action
      pattern: "^config\\.(apply|patch)$"
      result:
        instruction_type: WRITE
        metadata:
          confidentiality: LOW
          trustworthiness: HIGH
          reversible: true

