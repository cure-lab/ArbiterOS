# Codex tool parser definitions.
# Codex tools are normalized to OpenClaw semantics.
# Tools with cmd/file_path/target_directory args are handled by arg-alias patterns.

# ─── Shell / Command execution ───────────────────────────────────────────────

- tool: exec
  passes:
  - match_type: shell
    arg: command
  - match_type: shell
    arg: cmd

- tool: exec_command
  passes:
  - match_type: shell
    arg: command
  - match_type: shell
    arg: cmd

- tool: shell
  passes:
  - match_type: shell
    arg: command
  - match_type: shell
    arg: cmd

- tool: terminal
  passes:
  - match_type: shell
    arg: command
  - match_type: shell
    arg: cmd

- tool: run_command
  passes:
  - match_type: shell
    arg: command
  - match_type: shell
    arg: cmd

- tool: run_terminal_command
  passes:
  - match_type: shell
    arg: command
  - match_type: shell
    arg: cmd

# ─── Filesystem reads ────────────────────────────────────────────────────────

- tool: read
  passes:
  - match_type: default
    result:
      instruction_type: READ
      metadata:
        confidentiality: UNKNOWN
        trustworthiness: UNKNOWN
        reversible: true
  - match_type: path
    arg: path
  - match_type: path
    arg: file_path
  - match_type: path
    arg: target_directory
  - match_type: path
    arg: target_notebook
  - match_type: regex
    cases:
    - arg: path
      pattern: "(^|/)(SOUL|MEMORY|AGENTS|USER|IDENTITY)\\.md$|/memory/[^/]+\\.md$"
      result:
        instruction_type: RETRIEVE
        metadata:
          confidentiality: HIGH
          trustworthiness: HIGH
          reversible: true
    - arg: file_path
      pattern: "(^|/)(SOUL|MEMORY|AGENTS|USER|IDENTITY)\\.md$|/memory/[^/]+\\.md$"
      result:
        instruction_type: RETRIEVE
        metadata:
          confidentiality: HIGH
          trustworthiness: HIGH
          reversible: true

