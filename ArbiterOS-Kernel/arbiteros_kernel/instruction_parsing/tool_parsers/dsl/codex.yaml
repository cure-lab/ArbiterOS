      instruction_type: EXEC
      metadata:
        confidentiality: LOW
        trustworthiness: HIGH
        reversible: false
  - match_type: regex
    cases:
    - arg: action
      pattern: "^edit$"
      result:
        instruction_type: WRITE
        metadata:
          confidentiality: HIGH
          trustworthiness: HIGH
          reversible: true

- tool: ask_question
