# Claude Code tool parsers — OpenClaw-aligned semantics with CC argument aliases.

- tool: bash
  passes:
  - match_type: shell
    arg: command
  - match_type: shell
    arg: cmd
  - match_type: shell
    arg: bash_command
  - match_type: shell
    arg: shell_command

- tool: shell
  passes:
  - match_type: shell
    arg: command
  - match_type: shell
    arg: cmd
  - match_type: shell
    arg: bash_command
  - match_type: shell
    arg: shell_command

