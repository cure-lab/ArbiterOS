- tool: read
  passes:
  - match_type: default
    result:
      instruction_type: READ
      metadata:
        confidentiality: UNKNOWN
        trustworthiness: UNKNOWN
        reversible: true
  - match_type: path
    arg: path
  - match_type: path
    arg: file_path
  - match_type: path
    arg: filepath
  - match_type: path
    arg: target_path

