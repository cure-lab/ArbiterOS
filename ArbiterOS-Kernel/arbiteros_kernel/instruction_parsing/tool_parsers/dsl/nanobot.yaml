# Nanobot tool parser definitions.

- tool: read_file
  passes:
  - match_type: default
    result:
      instruction_type: READ
      metadata:
        confidentiality: UNKNOWN
        trustworthiness: UNKNOWN
        reversible: true
  - match_type: path
    arg: path
  - match_type: path
    arg: file_path
  - match_type: regex
    cases:
    - arg: path
      pattern: "(^|/)(SOUL|MEMORY|AGENTS|USER|IDENTITY)\\.md$|/memory/[^/]+\\.md$"
      result:
        instruction_type: RETRIEVE
        metadata:
          confidentiality: HIGH
          trustworthiness: HIGH
          reversible: true
    - arg: file_path
      pattern: "(^|/)(SOUL|MEMORY|AGENTS|USER|IDENTITY)\\.md$|/memory/[^/]+\\.md$"
      result:
        instruction_type: RETRIEVE
        metadata:
          confidentiality: HIGH
          trustworthiness: HIGH
          reversible: true

