- tool: exec
  passes:
  - match_type: shell
    arg: command

- tool: web_search
  passes:
  - match_type: default
    result:
      instruction_type: READ
      metadata:
        confidentiality: LOW
        trustworthiness: LOW
        reversible: true

- tool: web_fetch
