    result:
      instruction_type: EXEC
      metadata:
        confidentiality: LOW
        trustworthiness: HIGH
        reversible: false

- tool: spawn
  passes:
  - match_type: default
    result:
      instruction_type: DELEGATE
      metadata:
        confidentiality: HIGH
        trustworthiness: LOW
        reversible: false
