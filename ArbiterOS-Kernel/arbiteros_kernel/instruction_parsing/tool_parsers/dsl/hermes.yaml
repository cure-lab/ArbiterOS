- tool: terminal
  passes:
  - match_type: shell
    arg: command

- tool: process
  passes:
  - match_type: default
    result:
      instruction_type: EXEC
      metadata:
        confidentiality: LOW
        trustworthiness: HIGH
        reversible: false
  - match_type: regex
    cases:
    - arg: action
      pattern: "^(list|log)$"
      result:
        instruction_type: READ
        metadata:
          confidentiality: HIGH
          trustworthiness: HIGH
          reversible: true
    - arg: action
      pattern: "^poll$"
      result:
        instruction_type: WAIT
        metadata:
          confidentiality: LOW
          trustworthiness: HIGH
          reversible: true

- tool: cronjob
  passes:
  - match_type: default
    result:
      instruction_type: EXEC
      metadata:
        confidentiality: LOW
        trustworthiness: HIGH
        reversible: false
  - match_type: regex
    cases:
    - arg: action
      pattern: "^list$"
      result:
        instruction_type: READ
        metadata:
          confidentiality: LOW
          trustworthiness: HIGH
          reversible: true
    - arg: action
      pattern: "^(create|update)$"
      result:
        instruction_type: SUBSCRIBE
        metadata:
          confidentiality: LOW
          trustworthiness: HIGH
          reversible: true

