version: 1

path_rules:
  instructions:
    READ:
      allow_prefixes:
        - 're:^[A-Za-z]:[\\/]+Users[\\/]+[^\\/]+[\\/]+\.openclaw[\\/]+workspace($|[\\/])'
        - 're:^[A-Za-z]:[\\/]+Windows[\\/]+Logs($|[\\/])'
        - 're:^[A-Za-z]:[\\/]+Windows[\\/]+System32[\\/]+LogFiles($|[\\/])'
      deny_prefixes:
        - 're:^[A-Za-z]:[\\/]+Users[\\/]+[^\\/]+[\\/]+\.ssh($|[\\/])'
        - 're:^[A-Za-z]:[\\/]+Users[\\/]+[^\\/]+[\\/]+\.aws($|[\\/])'
        - 're:^[A-Za-z]:[\\/]+Users[\\/]+[^\\/]+[\\/]+\.gnupg($|[\\/])'
        - 're:^[A-Za-z]:[\\/]+Windows[\\/]+System32[\\/]+drivers[\\/]+etc($|[\\/])'

    WRITE:
      allow_prefixes:
        - 're:^[A-Za-z]:[\\/]+Users[\\/]+[^\\/]+[\\/]+\.openclaw[\\/]+workspace($|[\\/])'
      deny_prefixes:
        - 're:^[A-Za-z]:[\\/]+Users[\\/]+[^\\/]+[\\/]+\.ssh($|[\\/])'
        - 're:^[A-Za-z]:[\\/]+Users[\\/]+[^\\/]+[\\/]+\.aws($|[\\/])'
        - 're:^[A-Za-z]:[\\/]+Windows[\\/]+System32[\\/]+drivers[\\/]+etc($|[\\/])'
        - 're:^[A-Za-z]:[\\/]+Program Files($|[\\/])'
        - 're:^[A-Za-z]:[\\/]+Program Files \(x86\)($|[\\/])'

    EXEC:
      default:
        allow_prefixes:
          - 're:^[A-Za-z]:[\\/]+Users[\\/]+[^\\/]+[\\/]+\.openclaw[\\/]+workspace($|[\\/])'
        deny_prefixes:
          - 're:^[A-Za-z]:[\\/]*$'
          - 're:^[A-Za-z]:[\\/]+Users[\\/]+[^\\/]+[\\/]+\.ssh($|[\\/])'
          - 're:^[A-Za-z]:[\\/]+Users[\\/]+[^\\/]+[\\/]+\.aws($|[\\/])'
          - 're:^[A-Za-z]:[\\/]+Windows[\\/]+System32[\\/]+drivers[\\/]+etc($|[\\/])'
          - 're:^[A-Za-z]:[\\/]+Users[\\/]+Administrator($|[\\/])'

      profiles:
        READ_LIKE:
          match:
            commands: [cat, less, head, tail, grep, find, ls]
          allow_prefixes:
            - 're:^[A-Za-z]:[\\/]+Users[\\/]+[^\\/]+[\\/]+\.openclaw[\\/]+workspace($|[\\/])'
            - 're:^[A-Za-z]:[\\/]+Windows[\\/]+Logs($|[\\/])'
            - 're:^[A-Za-z]:[\\/]+Windows[\\/]+System32[\\/]+LogFiles($|[\\/])'
          deny_prefixes:
            - 're:^[A-Za-z]:[\\/]+Users[\\/]+[^\\/]+[\\/]+\.ssh($|[\\/])'
            - 're:^[A-Za-z]:[\\/]+Users[\\/]+[^\\/]+[\\/]+\.gnupg($|[\\/])'

        WRITE_LIKE:
          match:
            commands: [cp, mv, tee, sed, tar, unzip]
          allow_prefixes:
            - 're:^[A-Za-z]:[\\/]+Users[\\/]+[^\\/]+[\\/]+\.openclaw[\\/]+workspace($|[\\/])'
          deny_prefixes:
            - 're:^[A-Za-z]:[\\/]+Windows[\\/]+System32[\\/]+drivers[\\/]+etc($|[\\/])'
            - 're:^[A-Za-z]:[\\/]+Program Files($|[\\/])'
            - 're:^[A-Za-z]:[\\/]+Program Files \(x86\)($|[\\/])'
            - 're:^[A-Za-z]:[\\/]+Users[\\/]+[^\\/]+[\\/]+\.ssh($|[\\/])'

        DELETE_LIKE:
          match:
            commands: [rm, unlink, rmdir]
          allow_prefixes:
            - 're:^[A-Za-z]:[\\/]+Users[\\/]+[^\\/]+[\\/]+\.openclaw[\\/]+workspace[\\/]tmp($|[\\/])'
          deny_prefixes:
            - 're:^[A-Za-z]:[\\/]*$'
            - 're:^[A-Za-z]:[\\/]+Users[\\/]+[^\\/]+[\\/]+\.openclaw[\\/]+workspace[\\/]important($|[\\/])'
            - 're:^[A-Za-z]:[\\/]+Users[\\/]+[^\\/]+[\\/]+\.ssh($|[\\/])'

        SCRIPT_EXEC:
          match:
            interpreters: [python, python3, bash, sh, zsh, node, cmd]
            script_suffixes: [.py, .sh, .bash, .zsh, .js, .mjs, .cjs, .ts, .cmd, .bat]
          allow_prefixes:
            - 're:^[A-Za-z]:[\\/]+Users[\\/]+[^\\/]+[\\/]+\.openclaw[\\/]+workspace[\\/]scripts($|[\\/])'
          deny_prefixes:
            - 're:^[A-Za-z]:[\\/]*$'
            - 're:^[A-Za-z]:[\\/]+Users[\\/]+[^\\/]+[\\/]+\.ssh($|[\\/])'

        INLINE_CODE_EXEC:
          match:
            interpreters: [python, python3, bash, sh, node]
            inline_flags: [-c, -e]
          deny_prefixes:
            - 're:^[A-Za-z]:[\\/]*$'
            - 're:^[A-Za-z]:[\\/]+Users[\\/]+[^\\/]+[\\/]+\.ssh($|[\\/])'
            - 're:^[A-Za-z]:[\\/]+Users[\\/]+[^\\/]+[\\/]+\.aws($|[\\/])'

        UNKNOWN_EXEC:
          match:
            fallback: true
          deny_prefixes:
            - 're:^[A-Za-z]:[\\/]*$'
            - 're:^[A-Za-z]:[\\/]+Users[\\/]+[^\\/]+[\\/]+\.ssh($|[\\/])'
            - 're:^[A-Za-z]:[\\/]+Users[\\/]+[^\\/]+[\\/]+\.aws($|[\\/])'