version: 1

path_rules:
  instructions:
    READ:
      allow_prefixes:
        - ~/.openclaw/workspace
        - /var/log
      deny_prefixes:
        - ~/.ssh
        - ~/.aws
        - ~/.gnupg
        - re:^/etc($|/)

    WRITE:
      allow_prefixes:
        - ~/.openclaw/workspace
      deny_prefixes:
        - ~/.ssh
        - ~/.aws
        - re:^/etc($|/)
        - re:^/usr($|/)

    EXEC:
      default:
        allow_prefixes:
          - ~/.openclaw/workspace
        deny_prefixes:
          - /
          - ~/.ssh
          - ~/.aws
          - re:^/etc($|/)
          - re:^/root($|/)

      profiles:
        READ_LIKE:
          match:
            commands: [cat, less, head, tail, grep, find, ls]
          allow_prefixes:
            - ~/.openclaw/workspace
            - /var/log
          deny_prefixes:
            - ~/.ssh
            - ~/.gnupg

        WRITE_LIKE:
          match:
            commands: [cp, mv, tee, sed, tar, unzip]
          allow_prefixes:
            - ~/.openclaw/workspace
          deny_prefixes:
            - re:^/etc($|/)
            - re:^/usr($|/)
            - ~/.ssh

        DELETE_LIKE:
          match:
            commands: [rm, unlink, rmdir]
          allow_prefixes:
            - ~/.openclaw/workspace/tmp
          deny_prefixes:
            - /
            - ~/.openclaw/workspace/important
            - ~/.ssh

        SCRIPT_EXEC:
          match:
            interpreters: [python, python3, bash, sh, zsh, node]
            script_suffixes: [.py, .sh, .bash, .zsh, .js, .mjs, .cjs, .ts]
          allow_prefixes:
            - ~/.openclaw/workspace/scripts
          deny_prefixes:
            - /
            - ~/.ssh

        INLINE_CODE_EXEC:
          match:
            interpreters: [python, python3, bash, sh, node]
            inline_flags: [-c, -e]
          deny_prefixes:
            - /
            - ~/.ssh
            - ~/.aws

        UNKNOWN_EXEC:
          match:
            fallback: true
          deny_prefixes:
            - /
            - ~/.ssh
            - ~/.aws