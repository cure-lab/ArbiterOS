# Instruction-type classification for executables and shell commands.
#
# Keys   : EXEC | WRITE | READ
# Values : list of command patterns — either a bare executable basename
#          (e.g. "cat") or an "executable subcommand" two-token prefix
#          (e.g. "git log").  Matching is done on basename(tokens[0]), then
#          on "basename(tokens[0]) tokens[1]" when a non-flag second token
#          exists.
#
# Priority: EXEC > WRITE > READ.
#   The resolver checks EXEC first; the first match wins.
#   If nothing matches, the default is EXEC.

EXEC:
