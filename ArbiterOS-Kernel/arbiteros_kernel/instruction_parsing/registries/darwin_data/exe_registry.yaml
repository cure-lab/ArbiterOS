  # Shell / script interpreters  (run arbitrary code)
  # ---------------------------------------------------------------------------
  - bash
  - sh
  - zsh
  - fish
  - dash
  - ksh
  - csh
  - tcsh
  - ash
  - xargs
  - parallel
  - env # when used as "env CMD …" to launch a command

  # ---------------------------------------------------------------------------
  # macOS scripting / automation (high-risk code execution)
  # ---------------------------------------------------------------------------
  - osascript  # AppleScript / JXA: equivalent to bash -c for macOS
  - open       # can open URLs, apps, or execute scripts

